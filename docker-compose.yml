#version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bank_a_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bank_a
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bank_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bank_a_backend
    ports:
      - "8080:8000"
    environment:
      SERVER_PORT: 8000
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bank_a
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      KLIK_BASE_URL: ${KLIK_BASE_URL}
      KLIK_API_KEY: ${KLIK_API_KEY}
      KLIK_ZONE: ${KLIK_ZONE}
      ELIXIR_BASE_URL: http://host.docker.internal:8081
      EXPRESS_BASE_URL: http://host.docker.internal:8082
      SORBNET_BASE_URL: http://host.docker.internal:8083
      BANK_BICFI: BANK_A
      BANK_SORBNET_ACCOUNT: SORBNET-A-00000000000000000001
      BANK_ELIXIR_ACCOUNT: ELIXIR-A-00000000000000000001
      CARDS_GATEWAY_URL: ${CARDS_GATEWAY_URL}
      CARDS_PROVIDER_API_KEY: ${CARDS_PROVIDER_API_KEY}
      CARDS_PROVIDER_HMAC_SECRET: ${CARDS_PROVIDER_HMAC_SECRET}
      CARDS_PROVIDER_BIN: ${CARDS_PROVIDER_BIN}
      CARDS_PROVIDER_ADMIN_KEY: ${CARDS_PROVIDER_ADMIN_KEY}
      SWIFT_BASE_URL: ${SWIFT_BASE_URL}
      SWIFT_CLIENT_ID: ${SWIFT_CLIENT_ID}
      SWIFT_CLIENT_SECRET: ${SWIFT_CLIENT_SECRET}
      SWIFT_BIC: ${SWIFT_BIC}
      SWIFT_CALLBACK_URL: ${SWIFT_CALLBACK_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
    networks:
      bank_network:
      cards-backend:
        aliases:
          - polish-bank-a
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bank_a_frontend
    ports:
      - "5137:5137"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - bank_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bank_network:
    driver: bridge
  cards-backend:
    external: true