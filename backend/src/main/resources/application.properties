spring.application.name=bank-a
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.check-location=false
logging.level.org.flywaydb=DEBUG

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_a}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bank_admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secretpassword}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

integration.elixir.base-url=${ELIXIR_BASE_URL:http://elixir-service:8080}
app.elixir.poll-interval-ms=30000

integration.klik.base-url=${KLIK_BASE_URL}
integration.klik.api-key=${KLIK_API_KEY}
integration.klik.zone=${KLIK_ZONE:PL}

# Karty Płatnicze
integration.cards.gateway-url=${CARDS_GATEWAY_URL:http://cards_gateway_app:8000}
integration.cards.api-key=${CARDS_PROVIDER_API_KEY:bank-key-pl-a}
integration.cards.hmac-secret=${CARDS_PROVIDER_HMAC_SECRET:secret-pl-a-hmac}
integration.cards.bin-prefix=${CARDS_PROVIDER_BIN:410001}
integration.cards.request-timeout-ms=10000
integration.cards.admin-key=${CARDS_PROVIDER_ADMIN_KEY:admin-secret-key-2026}